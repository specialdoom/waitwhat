name: Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor $GITHUB_SHA origin/main; then
            echo "Tag must be on the main branch. Merge your PR first, then tag main."
            exit 1
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storeFile=../app/release.keystore
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Write config.dart
        run: |
          cat > lib/config.dart <<EOF
          const String kGroqApiKey = '${{ secrets.GROQ_API_KEY }}';
          const String kGithubToken = '${{ secrets.FEEDBACK_TOKEN }}';
          const String kGithubOwner = '${{ secrets.REPO_OWNER }}';
          const String kGithubRepo  = '${{ secrets.REPO_NAME }}';
          EOF

      - name: Flutter pub get
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/waitwhat-${TAG}.apk

      - name: Get release notes from merged PR
        id: release_notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          body=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls \
            --header "Accept: application/vnd.github+json" \
            --jq '.[0].body // "No release notes provided."')
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$body" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/waitwhat-v*.apk
          body: ${{ steps.release_notes.outputs.body }}
